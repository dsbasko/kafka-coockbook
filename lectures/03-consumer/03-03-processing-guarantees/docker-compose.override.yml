name: lecture-03-03

services:
  postgres:
    image: postgres:17-alpine
    container_name: lecture-03-03-postgres
    hostname: lecture-03-03-postgres
    ports:
      - "127.0.0.1:15432:5432"
    environment:
      POSTGRES_DB: lecture_03_03
      POSTGRES_USER: lecture
      POSTGRES_PASSWORD: lecture
    volumes:
      - lecture-03-03-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lecture -d lecture_03_03"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  lecture-03-03-pgdata:
